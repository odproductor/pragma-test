<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Mis tareas</ion-title>
    <ion-buttons slot="end">
      <ion-button *ngIf="rc.getFlag('categoriesEnabled')" routerLink="/categories">Categorías</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-item lines="full">
    <ion-input placeholder="Nueva tarea" [(ngModel)]="title" (keyup.enter)="addTask()"></ion-input>
    <ion-select
      *ngIf="rc.getFlag('categoriesEnabled')"
      slot="end"
      placeholder="Categoría"
      [(ngModel)]="newCategoryId"
      interface="popover">
      <ion-select-option [value]="null">Sin categoría</ion-select-option>
      <ion-select-option *ngFor="let c of (categories$ | async)" [value]="c.id">{{ c.name }}</ion-select-option>
    </ion-select>
    <ion-button slot="end" (click)="addTask()">Agregar</ion-button>
  </ion-item>

  <ion-item *ngIf="rc.getFlag('categoriesEnabled')" lines="full">
    <ion-label>Filtrar</ion-label>
    <ion-select [ngModel]="filter$ | async" (ngModelChange)="onFilterChange($event)" interface="popover">
      <ion-select-option [value]="null">Todas</ion-select-option>
      <ion-select-option *ngFor="let c of (categories$ | async)" [value]="c.id">{{ c.name }}</ion-select-option>
    </ion-select>
  </ion-item>

  <ng-container *ngIf="view$ | async as v">
    <ion-list *ngIf="v.tasks.length > 0; else empty">
      <ion-item *ngFor="let t of v.tasks; trackBy: trackById">
        <ion-checkbox slot="start" [checked]="t.done" (ionChange)="toggle(t.id)"></ion-checkbox>
        <ion-label [class.done]="t.done">
          <h2>{{ t.title }}</h2>
          <p *ngIf="rc.getFlag('categoriesEnabled') && t.categoryId">{{ categoryName(t.categoryId, v.categories) }}</p>
        </ion-label>
        <ion-button slot="end" fill="clear" color="danger" (click)="remove(t.id)">Borrar</ion-button>
      </ion-item>
    </ion-list>

    <ng-template #empty>
      <div class="empty">
        <p>No hay tareas todavía.</p>
        <ion-button size="small" fill="outline" (click)="seed()">Cargar 1000 de prueba</ion-button>
      </div>
    </ng-template>
  </ng-container>
</ion-content>
