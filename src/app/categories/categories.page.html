<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Categorías</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-item>
    <ion-input placeholder="Nombre de la categoría" [(ngModel)]="name" (keyup.enter)="addCategory()"></ion-input>
    <ion-button slot="end" (click)="addCategory()">Agregar</ion-button>
  </ion-item>

  <ion-list>
    <ion-item *ngFor="let c of (categories$ | async); trackBy: trackById">
      <ng-container *ngIf="editingId === c.id; else viewMode">
        <ion-input [(ngModel)]="editingName" (keyup.enter)="saveEdit()"></ion-input>
        <ion-button slot="end" fill="clear" (click)="saveEdit()">Guardar</ion-button>
        <ion-button slot="end" fill="clear" color="medium" (click)="cancelEdit()">Cancelar</ion-button>
      </ng-container>
      <ng-template #viewMode>
        <ion-label>{{ c.name }}</ion-label>
        <ion-button slot="end" fill="clear" (click)="startEdit(c)">Editar</ion-button>
        <ion-button slot="end" fill="clear" color="danger" (click)="remove(c.id)">Borrar</ion-button>
      </ng-template>
    </ion-item>
  </ion-list>
</ion-content>
